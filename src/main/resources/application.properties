spring.application.name=aiTradingCharts
server.port=${PORT:8080}

# Binance API endpoints
binance.api.base-url=https://api.binance.com/api/v3
binance.api.klines-endpoint=${binance.api.base-url}/klines
binance.api.klines-query-params=?symbol={symbol}&interval={interval}&limit={limit}

# Reduce log file size and retention
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=3
logging.level.root=WARN
logging.level.com.pxbt.dev.aiTradingCharts=INFO

# Spring specific logging
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# WebSocket noise reduction
logging.level.org.springframework.web.socket=WARN
logging.level.org.java_websocket=WARN

# WebClient noise
logging.level.org.springframework.web.reactive=WARN
logging.level.reactor.netty=WARN

# Binance API noise
logging.level.com.pxbt.dev.aiTradingCharts.Gateway=INFO

# Enable Actuator endpoints
management.endpoints.web.exposure.include=metrics,prometheus,health,info,env

# Enable metrics distribution for percentiles
# Disable memory-intensive histograms for performance stability
management.metrics.distribution.percentiles-histogram.http.server.requests=false

app.training.enabled=true
app.symbols=BTC,SOL,TAO,WIF
app.volatile-symbols=SOL,TAO,WIF
 
# Grafana Cloud OTLP Configuration
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=https://otlp-gateway-prod-eu-west-2.grafana.net/otlp/v1/metrics
management.otlp.metrics.export.step=30s
management.otlp.metrics.export.headers.Authorization=Basic ${OTLP_CREDENTIALS:}

# Authentication is handled in MetricsConfig.java using OTLP_CREDENTIALS env var
 
# Optional: Set root logging level back to WARN for production stability
logging.level.io.micrometer.registry.otlp=WARN